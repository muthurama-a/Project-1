<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4338ca"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    @keyframes spin { 
      0% {opacity:0;transform:scale(.5) rotate(-15deg)}
      15%, 80% {opacity:1;transform:scale(1) rotate(0)}
      85%, 100% {opacity:0;transform:scale(.5) rotate(15deg)}
    }
    @keyframes dp { 
      0% {opacity:0;transform:scale(0)}
      5%, 75% {opacity:1;transform:scale(1)}
      80%, 100% {opacity:0;transform:scale(0)}
    }
    @keyframes type { 
      0% {opacity:0;transform:translateY(8px)}
      3%, 50% {opacity:1;transform:translateY(0)}
      53%, 100% {opacity:0;transform:translateY(-8px)}
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    @keyframes fadeUp { 
      0% {opacity:0;transform:translateY(6px)}
      8%, 40% {opacity:1;transform:translateY(0)}
      45%, 100% {opacity:0;transform:translateY(-6px)}
    }
    @keyframes hideCursor {
      0%, 9% {opacity: 0}
      10%, 78% {opacity: 1}
      80%, 100% {opacity: 0}
    }
    .mk{animation:spin 10s cubic-bezier(.34,1.56,.64,1) infinite;opacity:0}
    .d1{animation:dp 10s cubic-bezier(.34,1.56,.64,1) .6s infinite;opacity:0;transform-origin:center}
    .d2{animation:dp 10s cubic-bezier(.34,1.56,.64,1) 1s infinite;opacity:0;transform-origin:center}
    .l0{animation:type 10s ease-out 1.2s infinite;opacity:0}
    .l1{animation:type 10s ease-out 1.44s infinite;opacity:0}
    .l2{animation:type 10s ease-out 1.68s infinite;opacity:0}
    .l3{animation:type 10s ease-out 1.92s infinite;opacity:0}
    .l4{animation:type 10s ease-out 2.16s infinite;opacity:0}
    .l5{animation:type 10s ease-out 2.4s infinite;opacity:0}
    .l6{animation:type 10s ease-out 2.64s infinite;opacity:0}
    .l7{animation:type 10s ease-out 2.88s infinite;opacity:0}
    .cur{animation:blink .8s step-end infinite 1s;fill:#06b6d4}
    .tag{animation:fadeUp 10s ease-out 3.6s infinite;opacity:0}
    .cursorGroup{animation:hideCursor 10s infinite;opacity:0}
  </style>
</defs>

<g class="mk" transform="translate(50,25) scale(0.72)">
  <g opacity="0.07" transform="translate(-6,-6)"><path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="url(#g1)"/></g>
  <g opacity="0.15" transform="translate(-3,-3)"><path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" stroke="url(#g1)" stroke-width="1.5" fill="none"/></g>
  <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="url(#g1)"/>
  <text x="96" y="82" text-anchor="middle" fill="white" font-family="Outfit,sans-serif" font-weight="800" font-size="52">T</text>
</g>
<circle class="d1" cx="86" cy="132" r="4.5" fill="url(#g1)" opacity="0.5"/>
<circle class="d2" cx="78" cy="142" r="3" fill="url(#g1)" opacity="0.3"/>
<text font-family="Outfit,sans-serif" font-weight="800" font-size="44" fill="#f8fafc" letter-spacing="-0.03em"><tspan class="l0" x="170" y="88">T</tspan><tspan class="l1" dx="0">h</tspan><tspan class="l2" dx="0">i</tspan><tspan class="l3" dx="0">n</tspan><tspan class="l4" dx="0">g</tspan><tspan class="l5" dx="0">u</tspan><tspan class="l6" dx="0">a</tspan><tspan class="l7" dx="0">l</tspan></text>
<g class="cursorGroup"><rect class="cur" x="420" y="62" width="2" height="34"/></g>
<text class="tag" x="170" y="112" font-family="JetBrains Mono,monospace" font-size="9" fill="#64748b" letter-spacing="3">THINK IT. SPEAK IT.</text>
</svg>